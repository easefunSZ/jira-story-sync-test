<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <title>LEAD-93 To-Be Deactivate and Delete Implementation</title>
  <desc>To-Be technical baseline for deactivate and cascading soft delete.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .t{font:700 28px Arial;fill:#172033}.st{font:400 15px Arial;fill:#526070}.band{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:6}.bh{font:700 18px Arial;fill:#172033}
      .n{fill:#fff;stroke:#94a3b8;stroke-width:1.6;rx:6}.active{fill:#dcfce7;stroke:#16a34a}.off{fill:#eef2ff;stroke:#6366f1}.db{fill:#dbeafe;stroke:#3b82f6}.del{fill:#fee2e2;stroke:#dc2626}.pending{fill:#fffaf0;stroke:#d69e2e;stroke-dasharray:7 5}
      .nt{font:700 15px Arial;fill:#172033}.code{font:700 12px Arial;fill:#334155}.note{font:400 12px Arial;fill:#526070}.warn{font:700 12px Arial;fill:#9a6700}.evt{font:700 12px Arial;fill:#334155}.line{stroke:#475569;stroke-width:1.8;fill:none;marker-end:url(#a)}
      .tx{fill:#fff5f5;stroke:#dc2626;stroke-width:1.5;stroke-dasharray:8 5;rx:6}.txh{font:700 13px Arial;fill:#991b1b}
    </style>
  </defs>
  <rect width="1500" height="820" fill="#f7f9fc"/>
  <text x="60" y="54" class="t">To-Be 实现设计：Deactivate / Delete</text>
  <text x="60" y="82" class="st">保持现有数据库语义：Deactivate/Active 只切换 email_status；Delete 级联软删除且不修改 version_status。</text>

  <rect x="60" y="120" width="1380" height="265" class="band"/><text x="86" y="158" class="bh">Deactivate</text>
  <rect x="100" y="205" width="230" height="95" class="n active"/><text x="124" y="239" class="nt">Enabled Template</text><text x="124" y="265" class="code">email_status = 1</text><text x="124" y="287" class="code">version_status = 1</text>
  <rect x="430" y="205" width="250" height="95" class="n db"/><text x="454" y="239" class="nt">Deactivate Capability</text><text x="454" y="265" class="code">update config.email_status = 0</text><text x="454" y="287" class="note">不更新 version；无新增 Audit</text>
  <path d="M330 252L430 252" class="line"/>
  <rect x="780" y="205" width="250" height="95" class="n off"/><text x="804" y="239" class="nt">Disabled Template</text><text x="804" y="265" class="code">version_status remains 1</text><text x="804" y="287" class="note">Adviser 不可见</text>
  <path d="M680 252L780 252" class="line"/>
  <rect x="1130" y="190" width="260" height="125" class="n active"/><text x="1154" y="223" class="nt">Active / Reactivate</text><text x="1154" y="249" class="code">update email_status = 1</text><text x="1154" y="270" class="note">不修改 version row</text><text x="1154" y="292" class="note">不重新执行 Publish Validation</text>
  <path d="M1030 252L1130 252" class="line"/><path d="M1260 315C1260 360 215 360 215 300" class="line"/>

  <rect x="60" y="420" width="1380" height="330" class="band"/><text x="86" y="458" class="bh">Delete</text>
  <rect x="100" y="510" width="220" height="85" class="n db"/><text x="124" y="542" class="nt">删除请求</text><text x="124" y="568" class="note">确认目标 email_code</text><text x="124" y="589" class="note">复用现有删除接口</text>
  <rect x="390" y="490" width="890" height="205" class="tx"/><text x="415" y="520" class="txh">ONE CASCADING SOFT-DELETE TRANSACTION</text>
  <rect x="420" y="550" width="190" height="95" class="n del"/><text x="444" y="582" class="nt">Config</text><text x="444" y="608" class="code">status → deleted</text><text x="444" y="630" class="note">email_status 不作为删除标志</text>
  <rect x="630" y="550" width="190" height="95" class="n del"/><text x="654" y="582" class="nt">All Versions</text><text x="654" y="608" class="code">status → deleted</text><text x="654" y="630" class="note">version_status 不变</text>
  <rect x="840" y="550" width="190" height="95" class="n del"/><text x="864" y="582" class="nt">Subcategory Rel</text><text x="864" y="608" class="code">status → deleted</text><text x="864" y="630" class="note">all template versions</text>
  <rect x="1050" y="550" width="200" height="95" class="n del"/><text x="1074" y="582" class="nt">Tag Relations</text><text x="1074" y="608" class="code">status → deleted</text><text x="1074" y="630" class="note">复用现有 Delete 事务</text>
  <path d="M320 552L390 552" class="line"/>
  <rect x="1310" y="520" width="100" height="145" class="n off"/><text x="1326" y="553" class="nt">Result</text><text x="1326" y="579" class="note">列表排除</text><text x="1326" y="601" class="note">无一键恢复</text><text x="1326" y="623" class="note">状态原子一致</text>
  <path d="M1280 592L1310 592" class="line"/>
  <text x="100" y="715" class="note">To-Be 覆盖 PRD “permanent delete”：本期保持数据库软删除，不做物理删除。</text>
  <text x="100" y="739" class="note">删除时在同一事务中扩展软删除子分类和标签关系；权限和响应沿用现有规范。</text>
</svg>
