      .table{fill:#fff;stroke:#94a3b8;stroke-width:1.5;rx:6}.changed{fill:#fffdf5;stroke:#d69e2e;stroke-width:1.7;rx:6}.new{fill:#f7fbff;stroke:#60a5fa;stroke-width:1.7;rx:6}.support{fill:#faf7ff;stroke:#8b5cf6;stroke-width:1.5;rx:6}.headReused{fill:#e8edf3}.headChanged{fill:#fff1bd}.headNew{fill:#dbeafe}.headSupport{fill:#ede9fe}.rule{stroke:#cbd5e1;stroke-width:1}.logical{stroke:#475569;stroke-width:1.6;stroke-dasharray:7 5;fill:none;marker-end:url(#a)}.legacy{stroke:#e11d48;stroke-width:1.5;stroke-dasharray:3 5;fill:none;marker-end:url(#a)}
    </style>
  </defs>
