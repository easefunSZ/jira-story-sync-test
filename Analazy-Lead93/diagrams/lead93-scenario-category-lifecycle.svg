<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <title>LEAD-93 Category 生命周期：As-Is 与 PRD v1.1 To-Be</title>
  <desc>As-Is Template Management 没有 Category 模型；To-Be 新增专用表、原子批量创建和迁移后删除。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .title{font:700 28px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.sub{font:400 15px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.section{font:700 19px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.h{font:700 15px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.body{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.small{font:400 12px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.code{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.label{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.asis{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5}.new{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5}.validate{fill:#fff7db;stroke:#d69e2e;stroke-width:1.5}.success{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.fail{fill:#fff1f2;stroke:#e11d48;stroke-width:1.5}.history{fill:#f1f5f9;stroke:#64748b;stroke-width:1.5}.edge{stroke:#475569;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:1.5;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="900" fill="#f7f9fc"/>
  <text x="60" y="50" class="title">Category / Subcategory 生命周期：变化在哪里</text>
  <text x="60" y="78" class="sub">PRD v1.1 新增两条后端原子能力；Template 版本状态机本身不改变。</text>

  <rect x="60" y="110" width="1380" height="165" rx="6" class="panel"/>
  <text x="88" y="145" class="section">As-Is 证据边界</text>
  <rect x="100" y="175" width="500" height="70" rx="6" class="asis"/>
  <text x="125" y="204" class="h">Template Category 不存在</text><text x="125" y="228" class="body">没有 Category/Subcategory 表、关系或管理流程。</text>
  <rect x="760" y="175" width="580" height="70" rx="6" class="asis"/>
  <text x="785" y="204" class="h">没有可复用的 As-Is 状态机</text><text x="785" y="228" class="body">批量创建、版本 Metadata 关系和 Reassign-and-Delete 都是新增能力。</text>
  <path d="M600 210L760 210" class="edge"/><text x="642" y="193" class="label">从零新增</text>

  <rect x="60" y="310" width="665" height="510" rx="6" class="panel"/>
  <text x="88" y="350" class="section">To-Be A：批量创建 Subcategory</text>
  <rect x="105" y="395" width="230" height="82" rx="6" class="new"/>
  <text x="130" y="426" class="h">提交 1-5 条</text><text x="130" y="451" class="body">同一 Parent Category</text>
  <rect x="420" y="395" width="240" height="82" rx="6" class="validate"/>
  <text x="445" y="426" class="h">整批预校验</text><text x="445" y="451" class="body">层级、有效 Parent、批内/全局重名</text>
  <path d="M335 436L420 436" class="edge"/>
  <rect x="420" y="535" width="240" height="88" rx="6" class="success"/>
  <text x="445" y="568" class="h">单事务批量 Insert</text><text x="445" y="594" class="body">全部成功后统一 Commit</text>
  <path d="M540 477L540 535" class="edge"/><text x="553" y="511" class="label">全部通过</text>
  <rect x="105" y="535" width="230" height="88" rx="6" class="fail"/>
  <text x="130" y="568" class="h">整批失败</text><text x="130" y="594" class="body">不创建部分节点</text>
  <path d="M420 455C365 500 300 500 220 535" class="edge"/><text x="292" y="505" class="label">任一失败</text>
  <rect x="105" y="680" width="555" height="82" rx="6" class="success"/>
  <text x="130" y="712" class="h">创建后立即可用</text><text x="130" y="738" class="body">Tree、编辑下拉框和 Search Filter 同步展示；软删除名称可重新创建。</text>
  <path d="M540 623L540 655L382 655L382 680" class="edge"/>

  <rect x="775" y="310" width="665" height="510" rx="6" class="panel"/>
  <text x="803" y="350" class="section">To-Be B：Reassign-and-Delete</text>
  <rect x="820" y="395" width="245" height="82" rx="6" class="new"/>
  <text x="845" y="426" class="h">选择源节点和目标</text><text x="845" y="451" class="body">目标 Category / Subcategory</text>
  <rect x="1145" y="395" width="245" height="82" rx="6" class="validate"/>
  <text x="1170" y="426" class="h">锁定并校验</text><text x="1170" y="451" class="body">源、目标、受影响 versions</text>
  <path d="M1065 436L1145 436" class="edge"/>
  <rect x="1145" y="535" width="245" height="95" rx="6" class="new"/>
  <text x="1170" y="566" class="h">迁移 Metadata</text><text x="1170" y="591" class="code">Active / Draft / Schedule</text><text x="1170" y="613" class="small">不改变 version_status / Tags</text>
  <path d="M1267 477L1267 535" class="edge"/>
  <rect x="820" y="535" width="245" height="95" rx="6" class="history"/>
  <text x="845" y="566" class="h">Expired 历史版本</text><text x="845" y="591" class="body">不迁移，保留原 Metadata</text><text x="845" y="613" class="small">本期产品不展示历史 Metadata</text>
  <path d="M1145 452C1085 490 1015 500 942 535" class="dash"/><text x="995" y="500" class="label">排除</text>
  <rect x="1145" y="685" width="245" height="82" rx="6" class="success"/>
  <text x="1170" y="716" class="h">迁移成功后软删除</text><text x="1170" y="741" class="body">记录 deleted_by / deleted_date</text>
  <path d="M1267 630L1267 685" class="edge"/>
  <rect x="820" y="685" width="245" height="82" rx="6" class="fail"/>
  <text x="845" y="716" class="h">任一步失败</text><text x="845" y="741" class="body">事务回滚，源节点保持有效</text>
  <path d="M1145 605C1090 650 1025 660 942 685" class="edge"/>
  <text x="60" y="865" class="small">核心差异：旧方案“引用即阻止删除”已取消；PRD v1.1 基线采用后端原子迁移后删除。</text>
</svg>
