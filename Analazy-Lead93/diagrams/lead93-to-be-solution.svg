<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <title>LEAD-93 To-Be Solution</title>
  <desc>Target solution architecture preserving existing lifecycle and adding metadata, taxonomy and search capabilities.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #526070; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 6; }
      .band-title { font: 700 16px Arial, sans-serif; fill: #172033; }
      .component { fill: #ffffff; stroke: #9aa7b8; stroke-width: 1.5; rx: 6; }
      .existing { fill: #e8edf3; stroke: #64748b; }
      .changed { fill: #dbeafe; stroke: #3b82f6; }
      .new { fill: #dcfce7; stroke: #22a559; }
      .migration { fill: #fef3c7; stroke: #d69e2e; }
      .component-title { font: 700 15px Arial, sans-serif; fill: #172033; }
      .component-note { font: 400 12px Arial, sans-serif; fill: #526070; }
      .line { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
      .legend { font: 700 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1500" height="900" fill="#f7f9fc"/>
  <text x="60" y="54" class="title">To-Be 总体方案：保留生命周期，增加可组合的管理能力</text>
  <text x="60" y="82" class="subtitle">逻辑能力图：数据归属已确定；实际 Controller/Service 类拆分与复用关系待 C01/C17。</text>

  <rect x="60" y="112" width="1380" height="105" class="band"/>
  <text x="82" y="142" class="band-title">Presentation</text>
  <rect x="240" y="137" width="260" height="56" class="component changed"/>
  <text x="267" y="162" class="component-title">Content Manager UI</text>
  <text x="267" y="181" class="component-note">Category / Tag / Search / Editor</text>
  <rect x="620" y="137" width="260" height="56" class="component existing"/>
  <text x="647" y="162" class="component-title">Published / Draft Tabs</text>
  <text x="647" y="181" class="component-note">沿用现有基础查询口径</text>
  <rect x="1000" y="137" width="260" height="56" class="component existing"/>
  <text x="1027" y="162" class="component-title">Adviser View</text>
  <text x="1027" y="181" class="component-note">强制 Published-only</text>

  <rect x="60" y="247" width="1380" height="180" class="band"/>
  <text x="82" y="277" class="band-title">Application Services / APIs</text>
  <rect x="135" y="302" width="230" height="82" class="component existing"/>
  <text x="158" y="332" class="component-title">Template Lifecycle Service</text>
  <text x="158" y="355" class="component-note">Save Draft / Publish</text>
  <text x="158" y="374" class="component-note">Deactivate / Delete 保持现状</text>
  <rect x="405" y="302" width="230" height="82" class="component new"/>
  <text x="428" y="332" class="component-title">Version Metadata Capability</text>
  <text x="428" y="355" class="component-note">主 Category / Subcategory</text>
  <text x="428" y="374" class="component-note">Tag 关系；不新增通用 Audit</text>
  <rect x="675" y="302" width="230" height="82" class="component changed"/>
  <text x="698" y="332" class="component-title">Category Capability</text>
  <text x="698" y="355" class="component-note">两级树 / 排序 / 软删除</text>
  <text x="698" y="374" class="component-note">完整性在 Service 校验</text>
  <rect x="945" y="302" width="200" height="82" class="component new"/>
  <text x="968" y="332" class="component-title">Tag Read Capability</text>
  <text x="968" y="355" class="component-note">只读 taxonomy</text>
  <text x="968" y="374" class="component-note">无管理 UI</text>
  <rect x="1185" y="302" width="200" height="82" class="component changed"/>
  <text x="1208" y="332" class="component-title">Search Capability</text>
  <text x="1208" y="355" class="component-note">Base Query + filters</text>
  <text x="1208" y="374" class="component-note">按 email_code 去重</text>

  <path d="M370 193 L250 302" class="line"/>
  <path d="M370 193 L520 302" class="line"/>
  <path d="M750 193 L790 302" class="line"/>
  <path d="M750 193 L1285 302" class="line"/>
  <path d="M1130 193 L1285 302" class="line"/>
  <text x="82" y="413" class="component-note">这些方框表示 To-Be 逻辑职责，不表示必须新增同名 Java Service/API；实现归属由内网代码核对决定。</text>

  <rect x="60" y="457" width="1380" height="285" class="band"/>
  <text x="82" y="487" class="band-title">Persistence</text>
  <rect x="100" y="520" width="270" height="78" class="component existing"/>
  <text x="124" y="550" class="component-title">iic_msg_email_config</text>
  <text x="124" y="575" class="component-note">Existing · Template Master</text>
  <rect x="100" y="628" width="270" height="78" class="component changed"/>
  <text x="124" y="658" class="component-title">iic_msg_email_config_version</text>
  <text x="124" y="683" class="component-note">Changed · Content / Lifecycle / category_id</text>

  <rect x="425" y="520" width="270" height="78" class="component changed"/>
  <text x="449" y="550" class="component-title">iic_msg_category_config</text>
  <text x="449" y="575" class="component-note">Changed · Two-level taxonomy</text>
  <rect x="425" y="628" width="270" height="78" class="component existing"/>
  <text x="449" y="658" class="component-title">iic_msg_file_upload</text>
  <text x="449" y="683" class="component-note">Existing · S3 file metadata</text>

  <rect x="750" y="520" width="270" height="78" class="component new"/>
  <text x="774" y="550" class="component-title">iic_msg_template_category_rel</text>
  <text x="774" y="575" class="component-note">New · subcategory relations</text>
  <rect x="750" y="628" width="270" height="78" class="component new"/>
  <text x="774" y="658" class="component-title">iic_msg_template_tag_rel</text>
  <text x="774" y="683" class="component-note">New · template tag selections</text>

  <rect x="1075" y="520" width="270" height="78" class="component new"/>
  <text x="1099" y="550" class="component-title">iic_msg_tag_group</text>
  <text x="1099" y="575" class="component-note">New · mandatory / optional groups</text>
  <rect x="1075" y="628" width="270" height="78" class="component new"/>
  <text x="1099" y="658" class="component-title">iic_msg_tag_value</text>
  <text x="1099" y="683" class="component-note">New · fixed tag values</text>

  <path d="M250 384 L235 520" class="line"/>
  <path d="M250 384 L235 628" class="line"/>
  <path d="M250 384 L390 470 L390 667 L425 667" class="line"/>
  <path d="M520 384 L885 520" class="line"/>
  <path d="M520 384 L885 628" class="line"/>
  <path d="M790 384 L560 520" class="line"/>
  <path d="M1045 384 L1210 520" class="line"/>
  <path d="M1045 384 L1210 628" class="line"/>

  <rect x="60" y="772" width="1380" height="80" class="band"/>
  <text x="82" y="802" class="band-title">Deployment / Migration</text>
  <rect x="300" y="790" width="850" height="40" class="component migration"/>
  <text x="330" y="816" class="component-title">DBA 幂等 SQL：Schema → Seed → Version Mapping（Q5）→ Validation Report</text>
  <path d="M725 790 L725 742" class="dash"/>

  <rect x="1170" y="798" width="18" height="18" class="existing"/>
  <text x="1196" y="812" class="legend">Existing</text>
  <rect x="1260" y="798" width="18" height="18" class="changed"/>
  <text x="1286" y="812" class="legend">Changed</text>
  <rect x="1350" y="798" width="18" height="18" class="new"/>
  <text x="1376" y="812" class="legend">New</text>
</svg>
