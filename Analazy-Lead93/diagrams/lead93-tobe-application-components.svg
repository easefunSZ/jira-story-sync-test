<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <title>LEAD-93 To-Be 应用组件与职责边界</title>
  <desc>按客户端、API、Service、Persistence 和复用集成展示 LEAD-93 的新增、修改与保持不变组件。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .title{font:700 30px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.sub{font:400 15px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.laneTitle{font:700 17px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.h{font:700 15px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.body{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.small{font:400 12px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.code{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .lane{fill:#fff;stroke:#cbd5e1;stroke-width:1.4}.changed{fill:#fff7db;stroke:#d69e2e;stroke-width:1.5}.new{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}.reused{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5}.db{fill:#f0fdf4;stroke:#22c55e;stroke-width:1.5}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.bus{stroke:#94a3b8;stroke-width:2;fill:none}.tag{font:700 11px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
    </style>
  </defs>
  <rect width="1600" height="980" fill="#f7f9fc"/>
  <text x="60" y="52" class="title">LEAD-93 To-Be 应用组件与职责边界</text>
  <text x="60" y="80" class="sub">本图表示逻辑职责，不要求必须新增同名代码类；颜色只表示本期改造类型。</text>

  <rect x="60" y="105" width="1480" height="54" rx="6" fill="#fff" stroke="#cbd5e1"/>
  <rect x="90" y="120" width="120" height="25" rx="4" class="changed"/><text x="115" y="137" class="tag">Changed</text>
  <rect x="235" y="120" width="120" height="25" rx="4" class="new"/><text x="276" y="137" class="tag">New</text>
  <rect x="380" y="120" width="120" height="25" rx="4" class="reused"/><text x="412" y="137" class="tag">Reused</text>
  <text x="545" y="137" class="small">箭头表示主要调用或持久化方向；详细 Endpoint 和 DTO 由 API Contract 冻结。</text>

  <rect x="60" y="185" width="1480" height="120" rx="6" class="lane"/>
  <text x="85" y="217" class="laneTitle">Client</text>
  <rect x="260" y="215" width="470" height="64" rx="6" class="changed"/>
  <text x="285" y="241" class="h">Content Manager UI</text><text x="285" y="263" class="body">Category 管理 · Tag 多选 · Metadata 编辑 · Search/Filter</text>
  <rect x="870" y="215" width="420" height="64" rx="6" class="changed"/>
  <text x="895" y="241" class="h">Adviser View</text><text x="895" y="263" class="body">Enabled + Active Published · 当前 Active Metadata</text>

  <rect x="60" y="330" width="1480" height="130" rx="6" class="lane"/>
  <text x="85" y="362" class="laneTitle">API / Controller</text>
  <rect x="180" y="370" width="360" height="64" rx="6" class="changed"/>
  <text x="205" y="396" class="h">Template API</text><text x="205" y="418" class="body">List · Detail · Save · Publish · Delete</text>
  <rect x="620" y="370" width="360" height="64" rx="6" class="new"/>
  <text x="645" y="396" class="h">Metadata API</text><text x="645" y="418" class="body">PUT 指定 version 的完整 Metadata 快照</text>
  <rect x="1060" y="370" width="360" height="64" rx="6" class="new"/>
  <text x="1085" y="396" class="h">Taxonomy API</text><text x="1085" y="418" class="body">CRUD · Batch · Impact · Reassign/Delete · Tag Read</text>

  <path d="M495 279L495 324L360 324L360 370" class="line"/>
  <path d="M495 279L495 324L800 324L800 370" class="line"/>
  <path d="M495 279L495 324L1240 324L1240 370" class="line"/>
  <path d="M1080 279L1080 324L520 324L520 370" class="line"/>

  <rect x="60" y="485" width="1480" height="190" rx="6" class="lane"/>
  <text x="85" y="517" class="laneTitle">Application Service</text>
  <rect x="115" y="535" width="305" height="105" rx="6" class="changed"/>
  <text x="140" y="562" class="h">Template Command Orchestrator</text>
  <text x="140" y="585" class="body">统一编排写命令与事务</text><text x="140" y="608" class="small">Save · Publish · Delete · Active</text>
  <rect x="455" y="535" width="235" height="105" rx="6" class="changed"/>
  <text x="480" y="562" class="h">Version Selector</text><text x="480" y="585" class="body">定位/创建目标 V(N)</text><text x="480" y="608" class="small">按已确认状态矩阵</text>
  <rect x="725" y="535" width="235" height="105" rx="6" class="changed"/>
  <text x="750" y="562" class="h">Validator</text><text x="750" y="585" class="body">Draft / Active / Publish</text><text x="750" y="608" class="small">命令级完整性校验</text>
  <rect x="995" y="535" width="235" height="105" rx="6" class="new"/>
  <text x="1020" y="562" class="h">Metadata Service</text><text x="1020" y="585" class="body">Category/Subcategory/Tag</text><text x="1020" y="608" class="small">版本快照与全量替换</text>
  <rect x="1265" y="535" width="235" height="105" rx="6" class="new"/>
  <text x="1290" y="562" class="h">Taxonomy Service</text><text x="1290" y="585" class="body">两级树 · 批量创建 · 迁移后删除</text><text x="1290" y="608" class="small">Tag 字典有效性</text>

  <path d="M360 434L360 535" class="line"/><path d="M800 434L1112 434L1112 535" class="line"/><path d="M1240 434L1382 434L1382 535" class="line"/>
  <path d="M420 587L455 587" class="line"/><path d="M690 587L725 587" class="line"/><path d="M960 587L995 587" class="line"/>

  <rect x="60" y="700" width="1480" height="155" rx="6" class="lane"/>
  <text x="85" y="732" class="laneTitle">Persistence</text>
  <rect x="145" y="750" width="360" height="76" rx="6" class="changed"/>
  <text x="170" y="777" class="h">Template Master / Version</text><text x="170" y="801" class="code">iic_msg_email_config(_version)</text>
  <rect x="620" y="750" width="360" height="76" rx="6" class="db"/>
  <text x="645" y="777" class="h">Version Metadata Relations</text><text x="645" y="801" class="body">Subcategory relation · Tag relation</text>
  <rect x="1095" y="750" width="360" height="76" rx="6" class="db"/>
  <text x="1120" y="777" class="h">Taxonomy Dictionaries</text><text x="1120" y="801" class="body">Category tree · Tag Group · Tag Value</text>

  <path d="M267 640L267 750" class="line"/><path d="M1112 640L800 700L800 750" class="line"/><path d="M1382 640L1275 750" class="line"/>

  <rect x="60" y="880" width="1480" height="65" rx="6" class="reused"/>
  <text x="85" y="908" class="laneTitle">Reused Integrations</text>
  <text x="315" y="908" class="h">Scheduler</text><text x="315" y="929" class="small">changeVersionStatusByEffectiveFrom()</text>
  <text x="740" y="908" class="h">Preview Renderer</text><text x="740" y="929" class="small">现有 API / DTO / Sanitization</text>
  <text x="1150" y="908" class="h">Attachment / S3</text><text x="1150" y="929" class="small">现有 file_keys 与对象保留策略</text>
</svg>
