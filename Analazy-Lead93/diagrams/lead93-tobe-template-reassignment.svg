<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <title>LEAD-93 To-Be Template Reassignment</title>
  <desc>Template reassignment reuses the new full-replacement Metadata API for a specific version without creating a version or changing version_status.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .title{font:700 28px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.sub{font:400 15px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.laneTitle{font:700 17px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.h{font:700 15px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.body{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.small{font:400 12px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.code{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.event{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .lane{fill:#fff;stroke:#cbd5e1;stroke-width:1.4;rx:6}.ui{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5;rx:6}.service{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5;rx:6}.write{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.5;rx:6}.draft{fill:#fff7db;stroke:#d69e2e;stroke-width:1.5;rx:6}.active{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5;rx:6}.rule{fill:#fff1f2;stroke:#e11d48;stroke-width:1.2;rx:5}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#a)}
    </style>
  </defs>
  <rect width="1500" height="820" fill="#f7f9fc"/>
  <text x="60" y="50" class="title">To-Be：Template Reassignment</text>
  <text x="60" y="78" class="sub">Reassignment 复用新增 Metadata API，全量替换指定 version 的 Category/Subcategory/Tag 快照。</text>

  <rect x="60" y="110" width="1380" height="175" class="lane"/>
  <text x="86" y="145" class="laneTitle">Frontend · Template Edit Form</text>
  <rect x="100" y="175" width="280" height="78" class="ui"/>
  <text x="125" y="207" class="h">加载目标 Version</text>
  <text x="125" y="232" class="body">返回完整 Metadata；Tag 组内多选</text>
  <rect x="470" y="175" width="300" height="78" class="ui"/>
  <text x="495" y="207" class="h">选择主 Category</text>
  <text x="495" y="232" class="body">单选；未选择时禁用 Subcategory</text>
  <rect x="860" y="175" width="320" height="78" class="draft"/>
  <text x="885" y="207" class="h">主 Category 发生切换</text>
  <text x="885" y="232" class="body">前端立即清空原 Subcategory 选择</text>
  <rect x="1260" y="175" width="140" height="78" class="ui"/>
  <text x="1285" y="207" class="h">Save</text>
  <text x="1285" y="232" class="small">提交完整快照</text>
  <path d="M380 214L470 214" class="line"/><path d="M770 214L860 214" class="line"/><path d="M1180 214L1260 214" class="line"/>

  <rect x="60" y="315" width="1380" height="265" class="lane"/>
  <text x="86" y="350" class="laneTitle">Backend · Validation and Transaction</text>
  <rect x="100" y="390" width="260" height="105" class="service"/>
  <text x="125" y="423" class="h">定位目标 Version</text>
  <text x="125" y="449" class="code">email_code + version</text>
  <text x="125" y="473" class="small">请求必须显式传入 version</text>
  <rect x="455" y="390" width="300" height="105" class="service"/>
  <text x="480" y="423" class="h">校验 Taxonomy</text>
  <text x="480" y="449" class="body">Category 有效且 level=1</text>
  <text x="480" y="473" class="body">全部 Subcategory 有效且属于该 Category</text>
  <rect x="850" y="390" width="280" height="105" class="write"/>
  <text x="875" y="423" class="h">同一事务写入</text>
  <text x="875" y="449" class="code">Update version.category_id</text>
  <text x="875" y="473" class="code">Replace Subcategory + multi-Tag relations</text>
  <rect x="1225" y="390" width="175" height="105" class="write"/>
  <text x="1250" y="423" class="h">Commit</text>
  <text x="1250" y="449" class="body">快照一致</text>
  <text x="1250" y="473" class="small">0 行或失败回滚</text>
  <path d="M360 442L455 442" class="line"/><path d="M755 442L850 442" class="line"/><path d="M1130 442L1225 442" class="line"/>
  <rect x="455" y="515" width="675" height="38" class="rule"/>
  <text x="480" y="540" class="small">PUT 全量替换：字段缺失不表示保持；残留 Subcategory、非法 Tag 或 Active 必填 Metadata 缺失时整体拒绝。</text>

  <rect x="60" y="610" width="1380" height="140" class="lane"/>
  <text x="86" y="645" class="laneTitle">Result · 由目标 Version 当前状态决定</text>
  <rect x="180" y="670" width="450" height="55" class="draft"/>
  <text x="205" y="693" class="h">Draft version_status = 3</text><text x="420" y="693" class="body">只更新 Draft Metadata，当前 Active 不变</text>
  <rect x="820" y="670" width="500" height="55" class="active"/>
  <text x="845" y="693" class="h">Active version_status = 1</text><text x="1060" y="693" class="body">metadata-only 立即生效</text><text x="845" y="715" class="small">更新导航、Search/Filter 和 Adviser 分类</text>
  <text x="60" y="790" class="small">已确认：每个标签组使用 tag_codes[] 多选；元数据接口显式传 email_code + version，全量替换且不修改状态。</text>
</svg>
