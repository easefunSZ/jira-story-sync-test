<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <title>LEAD-93 To-Be Category Delete Design</title>
  <desc>Reference-protected soft delete for Category and Subcategory.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .title{font:700 28px Arial;fill:#172033}.subtitle{font:400 15px Arial;fill:#526070}.lane{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:6}.laneTitle{font:700 18px Arial;fill:#172033}
      .node{fill:#fff;stroke:#94a3b8;stroke-width:1.6;rx:6}.request{fill:#dbeafe;stroke:#3b82f6}.decision{fill:#fff7d6;stroke:#d69e2e}.success{fill:#dcfce7;stroke:#16a34a}.blocked{fill:#fee2e2;stroke:#dc2626}.noteBox{fill:#eef2ff;stroke:#6366f1}
      .nodeTitle{font:700 15px Arial;fill:#172033}.code{font:700 12px Arial;fill:#334155}.note{font:400 12px Arial;fill:#526070}.warn{font:700 12px Arial;fill:#991b1b}.edge{stroke:#475569;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.label{font:700 12px Arial;fill:#334155}
    </style>
  </defs>
  <rect width="1500" height="820" fill="#f7f9fc"/>
  <text x="60" y="54" class="title">To-Be 实现设计：Category / Subcategory Delete</text>
  <text x="60" y="82" class="subtitle">引用保护、级联软删除和 LEAD-307 删除留痕已确定；真实权限与 API Contract 仍待内网核对。</text>

  <rect x="60" y="120" width="1380" height="570" class="lane"/>
  <text x="88" y="158" class="laneTitle">Category Delete Capability · Endpoint / Contract 待 C14</text>

  <rect x="95" y="220" width="210" height="100" class="node request"/>
  <text x="120" y="252" class="nodeTitle">Delete Request</text>
  <text x="120" y="278" class="code">category id + operator</text>
  <text x="120" y="300" class="note">校验 Content Manager 权限</text>

  <rect x="380" y="205" width="240" height="130" class="node decision"/>
  <text x="405" y="238" class="nodeTitle">Load &amp; Lock Node</text>
  <text x="405" y="264" class="code">is_deleted=0 AND level IN (1,2)</text>
  <text x="405" y="286" class="code">SELECT ... FOR UPDATE</text>
  <text x="405" y="308" class="note">Not Found 的 HTTP/error code 待 C14</text>

  <path d="M305 270L380 270" class="edge"/>

  <rect x="700" y="180" width="270" height="155" class="node decision"/>
  <text x="725" y="214" class="nodeTitle">Reference Validation</text>
  <text x="725" y="241" class="code">Level 1: main + all child refs</text>
  <text x="725" y="265" class="code">Level 2: selected node refs</text>
  <text x="725" y="289" class="note">Active/Draft/Schedule 阻止删除</text>
  <text x="725" y="313" class="note">Disabled 仍计入；Expired 不阻止</text>
  <path d="M620 270L700 270" class="edge"/>

  <rect x="1080" y="165" width="285" height="145" class="node blocked"/>
  <text x="1105" y="200" class="nodeTitle">Blocked: Category In Use</text>
  <text x="1105" y="228" class="warn">HTTP / error code 待 C14</text>
  <text x="1105" y="251" class="note">Category / Subcategory 保持不变</text>
  <text x="1105" y="276" class="note">可返回引用类型/数量，Contract 待确认</text>
  <path d="M970 225L1080 225" class="edge"/>
  <text x="1000" y="211" class="label">has reference</text>

  <rect x="710" y="440" width="260" height="135" class="node success"/>
  <text x="735" y="474" class="nodeTitle">Cascade Soft Delete</text>
  <text x="735" y="502" class="code">Level 1: parent + all children</text>
  <text x="735" y="526" class="code">Level 2: selected node only</text>
  <text x="735" y="550" class="note">记录 deleted_by / deleted_date</text>
  <path d="M835 335L835 440" class="edge"/>
  <text x="848" y="392" class="label">no reference</text>

  <rect x="1080" y="430" width="285" height="155" class="node noteBox"/>
  <text x="1105" y="464" class="nodeTitle">Commit &amp; Deletion Retention</text>
  <text x="1105" y="491" class="code">Success response 待 C14</text>
  <text x="1105" y="515" class="note">保留 ID/Name；写 deleted_by/date</text>
  <text x="1105" y="538" class="note">Tree/Search 立即排除该节点</text>
  <text x="1105" y="561" class="note">Expired 不阻止；不提供历史 Metadata 查看</text>
  <path d="M970 507L1080 507" class="edge"/>

  <rect x="95" y="425" width="475" height="175" class="node noteBox"/>
  <text x="120" y="460" class="nodeTitle">Concurrency Contract</text>
  <text x="120" y="490" class="note">新增/更新 Template Category relation 时也必须锁定目标 Category row。</text>
  <text x="120" y="516" class="note">Delete 与 relation write 通过数据库行锁串行，避免“检查后新增引用”。</text>
  <text x="120" y="542" class="note">不新增 Redis lock；事务失败整体回滚。</text>
  <text x="120" y="568" class="note">一级 Category 无任何模板引用时，父子节点在同一事务级联软删除。</text>

  <text x="95" y="724" class="subtitle">数据引用：version.category_id + Subcategory relation；Active/Draft/Schedule 阻止，Expired 不阻止。</text>
  <text x="95" y="748" class="subtitle">已删除名称可重建；门禁仅剩 C11/C14/C17 权限、Contract 与复用能力；不新增独立 Audit。</text>
</svg>
