<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" viewBox="0 0 1500 880">
  <title>LEAD-93 Search Filter Query Pipeline</title>
  <desc>Search first applies the existing tab base query to select email_code and result_version, then metadata filters, deduplication, pagination and ordered detail loading.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .title{font:700 28px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.sub{font:400 15px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.section{font:700 18px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.h{font:700 15px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.body{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.small{font:400 12px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.code{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.event{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:6}.input{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5;rx:6}.base{fill:#fff7db;stroke:#d69e2e;stroke-width:1.5;rx:6}.filter{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5;rx:6}.result{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5;rx:6}.pending{fill:#fff1f2;stroke:#e11d48;stroke-width:1.3;rx:6}.rule{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.2;rx:5}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#a)}
    </style>
  </defs>
  <rect width="1500" height="880" fill="#f7f9fc"/>
  <text x="60" y="50" class="title">Search / Filter：两阶段查询管线</text>
  <text x="60" y="78" class="sub">先由现有 Tab 语义选定 result version，再应用 Metadata 条件；不能先多表 Join 后直接分页。</text>

  <rect x="60" y="110" width="1380" height="135" class="panel"/>
  <text x="86" y="145" class="section">Request</text>
  <rect x="100" y="170" width="240" height="50" class="input"/><text x="125" y="201" class="h">Tab：Published / Draft</text>
  <rect x="390" y="170" width="240" height="50" class="input"/><text x="415" y="201" class="h">is_campaign · 必传</text>
  <rect x="680" y="170" width="310" height="50" class="input"/><text x="705" y="201" class="h">Keyword + Category/Subcategory</text>
  <rect x="1040" y="170" width="320" height="50" class="input"/><text x="1065" y="201" class="h">Tag Groups · 同组 ANY</text>

  <rect x="60" y="275" width="1380" height="430" class="panel"/>
  <text x="86" y="310" class="section">Query Pipeline</text>

  <rect x="90" y="355" width="300" height="175" class="base"/>
  <text x="115" y="388" class="h">Step 1 · Tab Base Query</text>
  <text x="115" y="417" class="body">Published：Enabled + Active + 未删除</text>
  <text x="115" y="443" class="body">Draft：保留三个现有 OR 分支</text>
  <text x="115" y="469" class="code">输出 email_code + result_version</text>
  <text x="115" y="496" class="small">不得把 Draft 简化为 status=3</text>
  <text x="115" y="518" class="small">完整选版仍受 C02-C04 门禁</text>

  <rect x="450" y="355" width="300" height="175" class="filter"/>
  <text x="475" y="388" class="h">Step 2 · Metadata Filter</text>
  <text x="475" y="417" class="body">读取 result_version.category_id</text>
  <text x="475" y="443" class="body">EXISTS Subcategory / Tag relations</text>
  <text x="475" y="469" class="code">跨维度 AND</text>
  <text x="475" y="495" class="code">同维度 / 同 Tag Group OR/ANY</text>
  <text x="475" y="518" class="small">Keyword：Title / Description / Tag Name</text>

  <rect x="810" y="355" width="270" height="175" class="filter"/>
  <text x="835" y="388" class="h">Step 3 · Scope &amp; Count</text>
  <text x="835" y="417" class="body">按 Tab 逻辑模板语义去重</text>
  <text x="835" y="443" class="body">稳定排序 + Pagination</text>
  <text x="835" y="469" class="code">List / Count 条件必须一致</text>
  <text x="835" y="495" class="small">排序字段仍待 C02/C03 核对</text>

  <rect x="1140" y="355" width="270" height="175" class="result"/>
  <text x="1165" y="388" class="h">Step 4 · Detail Result</text>
  <text x="1165" y="417" class="body">按分页 email_code 加载详情</text>
  <text x="1165" y="443" class="body">使用 FIELD() 恢复顺序</text>
  <text x="1165" y="469" class="code">返回 result_version Metadata</text>
  <text x="1165" y="495" class="small">无匹配：[] + total=0</text>

  <path d="M390 442L450 442" class="line"/><path d="M750 442L810 442" class="line"/><path d="M1080 442L1140 442" class="line"/>

  <rect x="90" y="565" width="620" height="105" class="rule"/>
  <text x="115" y="598" class="h">为什么不能先 Join 再分页？</text>
  <text x="115" y="624" class="body">一个 version 可有多个 Subcategory / Tag relation，多表 Join 会放大行数。</text>
  <text x="115" y="648" class="small">若直接分页，会出现重复模板、total 错误和跨页遗漏；优先使用 EXISTS 或先选 scope。</text>
  <rect x="790" y="565" width="620" height="105" class="rule"/>
  <text x="815" y="598" class="h">Published / Adviser 安全边界</text>
  <text x="815" y="624" class="body">Published Tab 不开放 Status Filter；Adviser 强制 Published-only。</text>
  <text x="815" y="648" class="small">请求参数不得绕过 Active + Enabled 语义；非法 is_campaign 不执行查询。</text>

  <rect x="60" y="735" width="1380" height="70" class="pending"/>
  <text x="86" y="765" class="h">实施门禁 · 不能由本图替代代码证据</text>
  <text x="86" y="790" class="small">Published/Draft 完整 Mapper、Count、括号、tenant/country、最终 result version 和排序仍待 C02-C04；Published + Status Filter 的正式 API 行为待 C14。</text>
  <text x="60" y="845" class="small">SQL 设计入口：QUERY_iic_msg_email_config.sql；图只定义查询阶段和组合语义，不表示当前模板已经可以直接绑定最终 Mapper。</text>
</svg>
