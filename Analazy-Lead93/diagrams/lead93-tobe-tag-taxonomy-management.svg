<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <title>LEAD-93 To-Be Tag Group/Value 管理与多选关联</title>
  <desc>展示固定 Tag Group、Tag Value、Template Version 多选关系，以及 DBA 维护、只读 API 和停用保护边界。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .title{font:700 29px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.sub{font:400 15px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.section{font:700 19px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.h{font:700 15px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.body{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.small{font:400 12px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.code{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.good{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#15803d}.warn{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#be123c}
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.group{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}.value{fill:#f0fdf4;stroke:#22c55e;stroke-width:1.5}.relation{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5}.control{fill:#fff7db;stroke:#d69e2e;stroke-width:1.5}.guard{fill:#fff1f2;stroke:#e11d48;stroke-width:1.4}.neutral{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:1.5;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}.divider{stroke:#cbd5e1;stroke-width:1}
    </style>
  </defs>
  <rect width="1500" height="920" fill="#f7f9fc"/>
  <text x="60" y="52" class="title">LEAD-93 To-Be Tag Group/Value 管理与多选关联</text>
  <text x="60" y="80" class="sub">Tag Taxonomy 是固定字典；Template Version 通过标准 relation rows 保存每个 Group 的多选结果。</text>

  <rect x="60" y="110" width="960" height="350" rx="6" class="panel"/>
  <text x="90" y="150" class="section">1. 固定 Taxonomy 结构</text>

  <rect x="105" y="185" width="385" height="225" rx="6" class="group"/>
  <text x="130" y="218" class="h">iic_msg_tag_group</text>
  <text x="130" y="244" class="code">group_code · group_name · is_mandatory</text>
  <line x1="130" y1="262" x2="465" y2="262" class="divider"/>
  <text x="130" y="289" class="good">Mandatory Groups · 4</text>
  <text x="130" y="314" class="body">Content Type · Trigger</text>
  <text x="130" y="338" class="body">Lifecycle Stage · Financial Need</text>
  <text x="130" y="369" class="body">Optional Groups · Proposition · Source</text>
  <text x="130" y="395" class="small">运行时固定 6 个 Group；无管理 UI</text>

  <rect x="610" y="185" width="365" height="225" rx="6" class="value"/>
  <text x="635" y="218" class="h">iic_msg_tag_value</text>
  <text x="635" y="244" class="code">tag_code · tag_name · group_code</text>
  <line x1="635" y1="262" x2="950" y2="262" class="divider"/>
  <text x="635" y="289" class="body">一个 Group 对应多个 Tag Value</text>
  <text x="635" y="318" class="good">Mandatory Group</text><text x="780" y="318" class="body">必须有一个 Unclassified 默认值</text>
  <text x="635" y="350" class="body">Financial Need 示例显示名：</text>
  <text x="635" y="376" class="code">Unclassified · Protection · Savings · ...</text>
  <text x="635" y="400" class="small">正式 tag_code 以批准后的 Seed 为准</text>

  <path d="M490 297L610 297" class="line"/><text x="528" y="279" class="code">1 : N</text>

  <rect x="1060" y="110" width="380" height="350" rx="6" class="panel"/>
  <text x="1090" y="150" class="section">2. 维护与读取边界</text>
  <rect x="1100" y="185" width="300" height="65" rx="6" class="control"/>
  <text x="1125" y="212" class="h">DBA SQL Script</text><text x="1125" y="234" class="body">Seed · Add · Update · Deactivate</text>
  <rect x="1100" y="280" width="300" height="76" rx="6" class="guard"/>
  <text x="1125" y="307" class="h">Reference / Policy Guard</text>
  <text x="1125" y="330" class="small">Active/Draft/Schedule 引用阻止停用</text>
  <text x="1125" y="349" class="small">Mandatory Group / 默认值不得停用</text>
  <rect x="1100" y="386" width="300" height="50" rx="6" class="relation"/>
  <text x="1125" y="416" class="h">Read-only Taxonomy API</text>
  <path d="M1250 250L1250 280" class="line"/>
  <path d="M1100 318L1025 318L1025 330L975 330" class="line"/>
  <path d="M975 395L1035 395L1035 411L1100 411" class="dash"/>

  <rect x="60" y="495" width="1380" height="350" rx="6" class="panel"/>
  <text x="90" y="535" class="section">3. Template Version 组内多选如何落库</text>

  <rect x="105" y="580" width="280" height="130" rx="6" class="neutral"/>
  <text x="130" y="612" class="h">Template Version</text>
  <text x="130" y="640" class="code">email_code = E1001</text>
  <text x="130" y="664" class="code">version = V2</text>
  <text x="130" y="692" class="small">Draft / Schedule / Active 独立保存</text>

  <rect x="475" y="555" width="525" height="205" rx="6" class="relation"/>
  <text x="500" y="587" class="h">iic_msg_template_tag_rel</text>
  <text x="500" y="613" class="code">每个选中 Tag Value 保存一条 relation row</text>
  <line x1="500" y1="632" x2="975" y2="632" class="divider"/>
  <text x="510" y="658" class="code">E1001 · V2 · FINANCIAL_NEED · PROTECTION</text>
  <text x="510" y="686" class="code">E1001 · V2 · FINANCIAL_NEED · SAVINGS</text>
  <text x="510" y="721" class="good">同一 Group 两行同时有效 = 组内多选</text>
  <text x="500" y="746" class="small">UK: email_code + version + group_code + tag_code</text>

  <rect x="1090" y="580" width="300" height="130" rx="6" class="group"/>
  <text x="1115" y="612" class="h">Template Edit / Filter</text>
  <text x="1115" y="640" class="body">API：group_code + tag_codes[]</text>
  <text x="1115" y="666" class="body">Edit：同 Group 多选</text>
  <text x="1115" y="692" class="body">Search：同组 OR/ANY，跨组 AND</text>

  <path d="M385 645L475 645" class="line"/><path d="M1000 645L1090 645" class="line"/>
  <path d="M1250 436L1250 500L1240 500L1240 580" class="line"/>
  <path d="M805 410L805 470L737 470L737 555" class="dash"/><text x="820" y="454" class="small">Group/Value 归属校验</text>

  <rect x="105" y="785" width="1285" height="35" rx="5" class="guard"/>
  <text x="130" y="808" class="small">停用仅修改字典 status，不物理删除历史 relation；Expired 不阻止停用，Active/Draft/Schedule 必须先完成 Metadata 调整。</text>
  <text x="60" y="885" class="small">API 使用 JSON 数组传输；数据库使用规范化 relation rows。Publish 时 4 个 Mandatory Group 每组至少一个有效值。</text>
</svg>
