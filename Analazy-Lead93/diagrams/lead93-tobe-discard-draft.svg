<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <title>LEAD-93 To-Be Discard Draft Routing</title>
  <desc>Discard is a UI action. Unsaved edits are dropped in the frontend, while a persisted published working copy reuses Version Delete. New drafts and scheduled versions use other existing actions.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>
      .title{font:700 28px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.sub{font:400 15px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.h{font:700 15px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.body{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.small{font:400 12px Arial,"Microsoft YaHei",sans-serif;fill:#526070}.code{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.event{font:700 12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:6}.start{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5;rx:6}.decision{fill:#fff;stroke:#64748b;stroke-width:1.6}.front{fill:#f5f3ff;stroke:#8b5cf6;stroke-width:1.5;rx:6}.delete{fill:#fff7db;stroke:#d69e2e;stroke-width:1.5;rx:6}.other{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5;rx:6}.warn{fill:#fff1f2;stroke:#e11d48;stroke-width:1.2;rx:5}.line{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#a)}
    </style>
  </defs>
  <rect width="1500" height="820" fill="#f7f9fc"/>
  <text x="60" y="50" class="title">To-Be：Discard Draft 操作映射</text>
  <text x="60" y="78" class="sub">Discard 是页面动作，不新增后端 API；只有 Published + 已持久化 Draft Working Copy 进入后端删除。</text>
  <rect x="60" y="110" width="1380" height="635" class="panel"/>

  <rect x="100" y="165" width="245" height="75" class="start"/>
  <text x="125" y="197" class="h">用户确认 Discard</text>
  <text x="125" y="222" class="small">编辑 Published Template</text>
  <polygon points="455,202 515,142 575,202 515,262" class="decision"/>
  <text x="478" y="197" class="event">已经</text><text x="471" y="217" class="small">Save Draft？</text>
  <path d="M345 202L455 202" class="line"/>

  <rect x="680" y="150" width="335" height="105" class="front"/>
  <text x="705" y="183" class="h">否 · 仅前端未保存内容</text>
  <text x="705" y="209" class="body">丢弃编辑器内存中的修改</text>
  <text x="705" y="233" class="small">不调用后端，不修改任何数据库记录</text>
  <path d="M575 185L680 185" class="line"/><text x="612" y="167" class="event">否</text>

  <polygon points="455,405 515,345 575,405 515,465" class="decision"/>
  <text x="477" y="400" class="event">Active +</text><text x="470" y="420" class="small">Draft 3？</text>
  <path d="M515 262L515 345" class="line"/><text x="532" y="307" class="event">是</text>

  <rect x="680" y="335" width="430" height="145" class="delete"/>
  <text x="705" y="368" class="h">是 · Published Working Copy</text>
  <text x="705" y="394" class="code">复用现有 Version Delete，不新增 Discard API</text>
  <text x="705" y="418" class="body">软删除 Draft version + 该 version 的 Subcategory/Tag relations</text>
  <text x="705" y="442" class="body">Update 影响 0 行时失败；Active version 保持不变</text>
  <text x="705" y="466" class="small">不清理 S3/file row，不回滚 config 主表字段</text>
  <path d="M575 388L680 388" class="line"/><text x="612" y="370" class="event">是</text>

  <rect x="680" y="525" width="700" height="120" class="other"/>
  <text x="705" y="558" class="h">新建且从未 Published 的 Draft</text>
  <text x="705" y="584" class="body">页面没有 Discard Draft 按钮</text>
  <text x="705" y="608" class="code">用户删除时复用 Template Delete</text>
  <text x="705" y="632" class="small">不是 Working Copy Discard</text>
  <path d="M1045 545L1045 625" stroke="#0284c7" stroke-width="1.2" fill="none"/>
  <text x="1095" y="558" class="h">Scheduled version</text>
  <text x="1095" y="584" class="body">不属于 Discard Draft</text>
  <text x="1095" y="608" class="code">Save Draft：0 → 3；或 Version Delete</text>
  <text x="1095" y="632" class="small">两条路径均保留旧 Active</text>
  <path d="M515 465L515 585L680 585" class="line"/><text x="535" y="562" class="event">否 · 不属于 Discard Draft</text>

  <rect x="100" y="675" width="1280" height="45" class="warn"/>
  <text x="125" y="703" class="small">边界：Discard Working Copy 只删除版本级数据；email_name、description、is_campaign 等已持久化主表字段不会回滚。</text>
  <text x="60" y="785" class="small">已确认：不新增放弃草稿或取消预约接口；版本删除与模板删除复用现有接口。</text>
</svg>
