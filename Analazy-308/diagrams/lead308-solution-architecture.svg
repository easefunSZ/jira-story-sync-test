<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #526079; }
      .section { font: 700 18px Arial, sans-serif; fill: #172033; }
      .label { font: 700 16px Arial, sans-serif; fill: #172033; }
      .text { font: 400 14px Arial, sans-serif; fill: #354052; }
      .small { font: 400 13px Arial, sans-serif; fill: #526079; }
      .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #7c8aa5; stroke-width: 2; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1500" height="820" fill="#f8fafc"/>
  <text x="60" y="58" class="title">LEAD-308 Adviser Template Library - To-Be 总体架构</text>
  <text x="60" y="88" class="subtitle">LEAD-308 新增消费侧只读能力；LEAD-93 继续负责模板生产、版本、分类与标签。</text>

  <rect x="55" y="125" width="300" height="600" rx="8" fill="#eef6ff" stroke="#83aee8" stroke-width="2"/>
  <text x="85" y="165" class="section">Adviser Web / Mobile</text>
  <rect x="85" y="195" width="240" height="75" rx="6" fill="#ffffff" stroke="#9bbce7"/>
  <text x="105" y="225" class="label">Template Library</text>
  <text x="105" y="249" class="small">卡片、分页、空状态、响应式</text>
  <rect x="85" y="290" width="240" height="95" rx="6" fill="#ffffff" stroke="#9bbce7"/>
  <text x="105" y="320" class="label">Discover Controls</text>
  <text x="105" y="344" class="small">Category / Search / Filter</text>
  <text x="105" y="365" class="small">Chips / Clear All / Sort</text>
  <rect x="85" y="405" width="240" height="75" rx="6" fill="#ffffff" stroke="#9bbce7"/>
  <text x="105" y="435" class="label">Read-only Preview</text>
  <text x="105" y="459" class="small">正文 + Metadata，不含附件</text>
  <rect x="85" y="500" width="240" height="75" rx="6" fill="#ffffff" stroke="#9bbce7"/>
  <text x="105" y="530" class="label">Use Template</text>
  <text x="105" y="554" class="small">Email / Campaign 工作流入口</text>
  <rect x="85" y="595" width="240" height="90" rx="6" fill="#fff7ed" stroke="#f2ad5f"/>
  <text x="105" y="625" class="label">Client State</text>
  <text x="105" y="649" class="small">保留搜索、筛选、排序、页码</text>
  <text x="105" y="670" class="small">以及滚动位置</text>

  <rect x="430" y="125" width="420" height="600" rx="8" fill="#f1f5f9" stroke="#96a4b8" stroke-width="2"/>
  <text x="460" y="165" class="section">LEAD-308 Adviser Read Service</text>
  <rect x="460" y="195" width="360" height="90" rx="6" fill="#ffffff" stroke="#a8b3c3"/>
  <text x="480" y="225" class="label">Visibility Guard</text>
  <text x="480" y="249" class="small">角色 / 租户 / 国家 + Published-only</text>
  <text x="480" y="270" class="small">任何客户端参数都不能绕过</text>
  <rect x="460" y="305" width="360" height="105" rx="6" fill="#ffffff" stroke="#a8b3c3"/>
  <text x="480" y="335" class="label">Library Query Orchestrator</text>
  <text x="480" y="359" class="small">选定 Active version，再叠加分类、标签、</text>
  <text x="480" y="381" class="small">关键词、排序、分页、Count</text>
  <rect x="460" y="430" width="360" height="90" rx="6" fill="#ffffff" stroke="#a8b3c3"/>
  <text x="480" y="460" class="label">Preview Facade</text>
  <text x="480" y="484" class="small">读取最新 Active，复用现有 Renderer</text>
  <text x="480" y="505" class="small">只返回正文与 Metadata</text>
  <rect x="460" y="540" width="360" height="105" rx="6" fill="#ffffff" stroke="#a8b3c3"/>
  <text x="480" y="570" class="label">Activation Resolver</text>
  <text x="480" y="594" class="small">点击时重新读取最新 Active version</text>
  <text x="480" y="616" class="small">按 is_campaign 分流；下游 Contract 待确认</text>
  <rect x="460" y="665" width="360" height="40" rx="6" fill="#fff7ed" stroke="#f2ad5f"/>
  <text x="480" y="691" class="small">不新增模板生命周期状态，不写模板数据</text>

  <rect x="925" y="125" width="520" height="390" rx="8" fill="#eefbf3" stroke="#77bc91" stroke-width="2"/>
  <text x="955" y="165" class="section">LEAD-93 Foundation / Existing Components</text>
  <rect x="955" y="195" width="220" height="90" rx="6" fill="#ffffff" stroke="#91c7a4"/>
  <text x="975" y="225" class="label">Template Master</text>
  <text x="975" y="249" class="small">Title / Description / Format</text>
  <text x="975" y="270" class="small">Enable / Soft Delete</text>
  <rect x="1195" y="195" width="220" height="90" rx="6" fill="#ffffff" stroke="#91c7a4"/>
  <text x="1215" y="225" class="label">Template Version</text>
  <text x="1215" y="249" class="small">Body / Subject / Attachments</text>
  <text x="1215" y="270" class="small">Active / Draft / Schedule / Expired</text>
  <rect x="955" y="305" width="220" height="90" rx="6" fill="#ffffff" stroke="#91c7a4"/>
  <text x="975" y="335" class="label">Version Metadata</text>
  <text x="975" y="359" class="small">Category / Subcategory / Tags</text>
  <text x="975" y="380" class="small">与 email_code + version 对齐</text>
  <rect x="1195" y="305" width="220" height="90" rx="6" fill="#ffffff" stroke="#91c7a4"/>
  <text x="1215" y="335" class="label">Existing Renderer</text>
  <text x="1215" y="359" class="small">正文渲染与内容净化</text>
  <text x="1215" y="380" class="small">Preview 不加载附件</text>
  <rect x="955" y="415" width="460" height="70" rx="6" fill="#ffffff" stroke="#91c7a4"/>
  <text x="975" y="445" class="label">Existing Attachment / S3</text>
  <text x="975" y="469" class="small">仅在 Use Template 下游装载时复用；不进入 Preview</text>

  <rect x="925" y="550" width="520" height="175" rx="8" fill="#fff7ed" stroke="#f2ad5f" stroke-width="2"/>
  <text x="955" y="590" class="section">Downstream Communication Workflows</text>
  <rect x="955" y="620" width="220" height="75" rx="6" fill="#ffffff" stroke="#f0bd7d"/>
  <text x="975" y="650" class="label">Email Composer</text>
  <text x="975" y="674" class="small">入口与 Payload 待内网核对</text>
  <rect x="1195" y="620" width="220" height="75" rx="6" fill="#ffffff" stroke="#f0bd7d"/>
  <text x="1215" y="650" class="label">Campaign Builder</text>
  <text x="1215" y="674" class="small">管理入口与 Contract 待确认</text>

  <path d="M355 330 H430" class="line"/>
  <path d="M850 350 H925" class="line"/>
  <path d="M850 475 H925" class="line"/>
  <path d="M850 595 H900 V637 H925" class="line"/>
  <path d="M925 680 H870 V565 H850" class="dashed"/>
  <text x="862" y="337" class="small">只读查询</text>
  <text x="860" y="462" class="small">正文预览</text>
  <text x="858" y="622" class="small">激活</text>
</svg>
