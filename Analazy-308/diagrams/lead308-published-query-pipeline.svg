<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="900" viewBox="0 0 1520 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#526079"/></marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .sub { font: 400 15px Arial, sans-serif; fill: #526079; }
      .head { font: 700 17px Arial, sans-serif; fill: #172033; }
      .text { font: 400 14px Arial, sans-serif; fill: #354052; }
      .small { font: 400 13px Arial, sans-serif; fill: #526079; }
      .step { fill: #ffffff; stroke: #8ea0ba; stroke-width: 2; }
      .fixed { fill: #eefbf3; stroke: #67ad82; stroke-width: 2; }
      .tbd { fill: #fff7ed; stroke: #e9a34f; stroke-width: 2; }
      .line { stroke: #526079; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1520" height="900" fill="#f8fafc"/>
  <text x="60" y="58" class="title">Adviser Published-only 查询与展示管线</text>
  <text x="60" y="88" class="sub">先冻结可见版本，再做 Metadata 过滤、排序和分页；Draft / Schedule / Expired 永远不进入 Adviser 结果。</text>

  <rect x="60" y="135" width="260" height="120" rx="8" class="step"/>
  <text x="85" y="170" class="head">1. 请求校验</text>
  <text x="85" y="198" class="text">Adviser 权限、tenant、country</text>
  <text x="85" y="222" class="text">keyword 长度、分页、排序枚举</text>
  <text x="85" y="245" class="small">Status 参数不开放</text>

  <rect x="390" y="135" width="330" height="170" rx="8" class="fixed"/>
  <text x="415" y="170" class="head">2. Published Base Scope</text>
  <text x="415" y="198" class="text">config.status = 0</text>
  <text x="415" y="222" class="text">config.email_status = 1</text>
  <text x="415" y="246" class="text">version.status = 0</text>
  <text x="415" y="270" class="text">version.version_status = 1</text>
  <text x="415" y="294" class="small">is_campaign 的跨类型策略待确认</text>

  <rect x="790" y="135" width="310" height="170" rx="8" class="fixed"/>
  <text x="815" y="170" class="head">3. Active Version Metadata</text>
  <text x="815" y="198" class="text">Main Category：version.category_id</text>
  <text x="815" y="222" class="text">Subcategory：email_code + version</text>
  <text x="815" y="246" class="text">Tags：email_code + version</text>
  <text x="815" y="270" class="text">仅保留有效 taxonomy 节点</text>
  <text x="815" y="294" class="small">Metadata 不从 Draft 借用</text>

  <rect x="1170" y="135" width="290" height="170" rx="8" class="step"/>
  <text x="1195" y="170" class="head">4. 条件组合</text>
  <text x="1195" y="198" class="text">Keyword + Category + Tags</text>
  <text x="1195" y="222" class="text">跨维度 AND</text>
  <text x="1195" y="246" class="text">同一维度多值 OR / ANY</text>
  <text x="1195" y="270" class="small">Keyword：Title / Description / Tag</text>
  <text x="1195" y="294" class="small">至少 2 字符，大小写不敏感</text>

  <path d="M320 195 H390" class="line"/>
  <path d="M720 220 H790" class="line"/>
  <path d="M1100 220 H1170" class="line"/>

  <rect x="160" y="385" width="330" height="150" rx="8" class="step"/>
  <text x="185" y="420" class="head">5. 去重与 Count</text>
  <text x="185" y="448" class="text">按 email_code + result_version</text>
  <text x="185" y="472" class="text">先去重，再 Count / Pagination</text>
  <text x="185" y="496" class="small">避免 Subcategory / Tag Join 扩行</text>
  <text x="185" y="520" class="small">Category Count 精确定义待确认</text>

  <rect x="595" y="385" width="330" height="150" rx="8" class="tbd"/>
  <text x="620" y="420" class="head">6. 排序</text>
  <text x="620" y="448" class="text">Newest / Oldest / A-Z / Z-A</text>
  <text x="620" y="472" class="text">Most Relevant</text>
  <text x="620" y="496" class="small">Published Date 映射待确认</text>
  <text x="620" y="520" class="small">相关度评分规则待 BA / PO 确认</text>

  <rect x="1030" y="385" width="330" height="150" rx="8" class="step"/>
  <text x="1055" y="420" class="head">7. View Model 组装</text>
  <text x="1055" y="448" class="text">Card + Category Path + 4 Tag Groups</text>
  <text x="1055" y="472" class="text">Thumbnail + Published Date</text>
  <text x="1055" y="496" class="small">不返回 Draft indicator</text>
  <text x="1055" y="520" class="small">不返回附件内容</text>

  <path d="M1315 305 V345 H325 V385" class="line"/>
  <path d="M490 460 H595" class="line"/>
  <path d="M925 460 H1030" class="line"/>

  <rect x="95" y="635" width="1330" height="180" rx="8" fill="#eef6ff" stroke="#83aee8" stroke-width="2"/>
  <text x="125" y="675" class="head">Adviser 可见性不可变式</text>
  <text x="125" y="710" class="text">A. 页面加载后即使存在 Working Copy，仍只显示当前 Active version，不显示“Draft in Progress”。</text>
  <text x="125" y="742" class="text">B. Preview 与 Use Template 都必须由 email_code 在服务端重新解析可见 Active version，不能信任客户端传入的 version。</text>
  <text x="125" y="774" class="text">C. Template、Category 或关系被软删除，或 config 被 Deactivate 后，不再返回；历史 Expired version 不进入 Adviser 查询。</text>
  <text x="125" y="806" class="small">图中橙色节点是尚未冻结的业务/Contract 决策；其余节点来自 LEAD-93 已确认规则和 LEAD-308 PRD。</text>
</svg>
